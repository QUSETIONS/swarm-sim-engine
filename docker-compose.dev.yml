version: "3.9"

services:
  backend:
    build: ./backend
    container_name: swarm-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker for sandbox
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: swarm-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
